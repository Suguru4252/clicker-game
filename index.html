<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPERIA CLICKER 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a050f 0%, #1a1025 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: rgba(10, 5, 20, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 2px solid #ffd700;
        }
        
        .header {
            background: linear-gradient(135deg, #2a1b3d 0%, #1a0f2a 100%);
            color: white;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        
        .username {
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
        }
        
        .admin-badge {
            background: linear-gradient(135deg, #ff0000, #990000);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 8px;
            display: inline-block;
            border: 1px solid #ff6666;
            animation: adminPulse 1s infinite;
        }
        
        @keyframes adminPulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; box-shadow: 0 0 10px red; }
            100% { opacity: 0.8; }
        }
        
        .special-badge {
            background: linear-gradient(135deg, #ff00ff, #ffd700);
            color: black;
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 5px;
            display: inline-block;
            font-weight: bold;
        }
        
        .offline-badge {
            background: rgba(255, 215, 0, 0.25);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 8px 15px;
            font-size: 14px;
            display: inline-block;
            color: #ffd700;
            margin: 5px 0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 15px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 5px;
            border-radius: 15px;
            flex: 1;
            border: 2px solid rgba(255, 215, 0, 0.5);
        }
        
        .balance-label {
            font-size: 11px;
            opacity: 0.9;
        }
        
        .balance-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 8px;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 4px;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            color: white;
            scrollbar-width: none;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }
        
        .clicker-area {
            text-align: center;
            cursor: pointer;
        }
        
        .click-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 60px;
            color: white;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.6);
            cursor: pointer;
            position: relative;
            z-index: 5;
            pointer-events: auto;
        }
        
        .click-btn:active {
            transform: scale(0.95);
        }
        
        .click-btn span {
            font-size: 20px;
            margin-top: 10px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
            cursor: pointer;
        }
        
        .offline-earnings {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            font-size: 16px;
            animation: pulse 2s infinite;
            font-weight: bold;
            cursor: pointer;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .card-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #3a2a4d 0%, #2a1a3d 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 18px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            font-size: 18px;
            transition: transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: black;
            font-weight: bold;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
        }
        
        .btn-admin {
            background: linear-gradient(135deg, #ff0000 0%, #990000 100%);
            border: 2px solid #ff6666;
            color: white;
            font-weight: bold;
        }
        
        .btn-admin-small {
            background: linear-gradient(135deg, #ff0000 0%, #990000 100%);
            border: 1px solid #ff6666;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin: 5px;
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            padding: 15px 20px;
            width: 100%;
            margin: 10px 0;
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        .input-field:focus {
            border-color: #ffd700;
        }
        
        .admin-input {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff0000;
            border-radius: 30px;
            padding: 10px 15px;
            width: 100%;
            margin: 5px 0;
            color: white;
        }
        
        .admin-select {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff0000;
            border-radius: 30px;
            padding: 10px 15px;
            width: 100%;
            margin: 5px 0;
            color: white;
        }
        
        .bottom-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 5px;
            gap: 5px;
            border-top: 3px solid #ffd700;
            overflow-x: auto;
            scrollbar-width: none;
            white-space: nowrap;
        }
        
        .bottom-nav::-webkit-scrollbar {
            display: none;
        }
        
        .nav-item {
            flex: 0 0 auto;
            text-align: center;
            padding: 12px 15px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            min-width: 70px;
        }
        
        .nav-item span {
            font-size: 22px;
            display: block;
            margin-bottom: 5px;
        }
        
        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
        }
        
        .shop-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 18px;
        }
        
        .item-price {
            color: #4CAF50;
            font-weight: bold;
            font-size: 16px;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #4a2a6a 0%, #3a1a5a 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .business-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .business-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 20px;
        }
        
        .business-level {
            color: #4CAF50;
            font-size: 16px;
            font-weight: bold;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            margin: 10px 0;
        }
        
        .crypto-item {
            background: rgba(0, 200, 83, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            border: 2px solid #00c853;
        }
        
        .crypto-name {
            font-weight: bold;
            color: #00c853;
            font-size: 18px;
        }
        
        .crypto-price {
            color: #ffd700;
            font-size: 16px;
        }
        
        .crypto-owned {
            color: #4CAF50;
            font-size: 14px;
        }
        
        .crypto-profit {
            color: #ff9800;
            font-size: 12px;
        }
        
        .crypto-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }
        
        .crypto-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #00c853;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .collection-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .collection-item span {
            font-size: 32px;
            display: block;
            margin-bottom: 5px;
        }
        
        .collection-name {
            font-size: 12px;
            color: #ffd700;
        }
        
        .collection-owned {
            font-size: 11px;
            color: #4CAF50;
        }
        
        .collection-detail {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .collection-emoji {
            font-size: 42px;
            width: 70px;
            text-align: center;
        }
        
        .collection-details {
            flex: 1;
        }
        
        .collection-title {
            font-weight: bold;
            font-size: 18px;
        }
        
        .collection-price {
            color: #ffd700;
            font-size: 16px;
        }
        
        .property-owned {
            background: #2e7d32;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .special-item {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,0,255,0.2));
            border: 3px solid #ff00ff;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            animation: glow 2s infinite;
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 10px #ff00ff; }
            50% { box-shadow: 0 0 30px #ff00ff; }
            100% { box-shadow: 0 0 10px #ff00ff; }
        }
        
        .special-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .special-title {
            font-size: 20px;
            font-weight: bold;
            color: #ff00ff;
        }
        
        .special-price {
            font-size: 14px;
            color: #ffd700;
        }
        
        .special-income {
            font-size: 14px;
            color: #4CAF50;
        }
        
        .special-owned {
            background: #ff00ff;
            color: black;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1025;
            border-radius: 30px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            color: white;
            border: 3px solid #ffd700;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
        }
        
        .close-btn {
            background: #f44336;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #ffd700;
        }
        
        .top-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .top-rank {
            width: 40px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
        
        .top-rank-1 { color: #ffd700; }
        .top-rank-2 { color: #c0c0c0; }
        .top-rank-3 { color: #cd7f32; }
        
        .top-name {
            flex: 1;
            font-size: 16px;
            font-weight: bold;
        }
        
        .top-money {
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .top-special {
            font-size: 14px;
            margin-left: 5px;
        }
        
        .admin-grant-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0.3) 0%, transparent 70%);
            animation: grantFlash 2s ease-out;
            pointer-events: none;
            z-index: 9999;
        }
        
        @keyframes grantFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        .floating-effect {
            position: fixed;
            color: #ffd700;
            font-weight: bold;
            font-size: 24px;
            pointer-events: none;
            z-index: 9999;
            text-shadow: 0 0 10px #ffaa00;
            animation: floatUp 1s ease-out forwards;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }
        
        .settings-group {
            margin-bottom: 20px;
        }
        
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        
        .settings-label {
            font-size: 16px;
        }
        
        .settings-switch {
            width: 50px;
            height: 26px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            border: 2px solid #ffd700;
        }
        
        .settings-switch.active {
            background: #ffd700;
        }
        
        .settings-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 0;
            left: 0;
            transition: 0.2s;
        }
        
        .settings-switch.active::after {
            left: 24px;
        }
        
        .info-text {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
            margin: 10px 0;
        }
        
        .version-text {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-top: 5px;
        }
        
        .admin-button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin: 10px 0;
        }
        
        .admin-section {
            background: rgba(255,0,0,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ff0000;
        }
        
        .admin-section-title {
            color: #ff0000;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="header" id="header">
            <div class="username" id="username" onclick="showNicknameModal()">
                👑 ЗАГРУЗКА...
            </div>
            <div class="offline-badge" id="offlineBadge" style="display:none;">⏱️ ОФФЛАЙН ДОХОД</div>
            
            <div class="balance-container">
                <div class="balance-box">
                    <div class="balance-label">💰 МОНЕТЫ</div>
                    <div class="balance-value" id="balance">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">💎 АЛМАЗЫ</div>
                    <div class="balance-value" id="diamonds">10</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">📊 УРОВЕНЬ</div>
                    <div class="balance-value" id="level">1</div>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
        </div>
        
        <div class="content" id="content"></div>
        
        <div class="bottom-nav" id="bottomNav">
            <div class="nav-item active" data-tab="home"><span>🏠</span>ГЛАВНАЯ</div>
            <div class="nav-item" data-tab="mybusiness"><span>💼</span>БИЗНЕСЫ</div>
            <div class="nav-item" data-tab="crypto"><span>📈</span>КРИПТА</div>
            <div class="nav-item" data-tab="collection"><span>🎨</span>КОЛЛЕКЦИЯ</div>
            <div class="nav-item" data-tab="shop"><span>🏪</span>МАГАЗИН</div>
            <div class="nav-item" data-tab="top"><span>🏆</span>ТОП-100</div>
            <div class="nav-item" data-tab="stats"><span>📊</span>СТАТИС.</div>
            <div class="nav-item" data-tab="settings"><span>⚙️</span>НАСТР.</div>
        </div>
    </div>
    
    <div class="modal" id="businessModal">
        <div class="modal-content" id="businessModalContent"></div>
    </div>
    
    <div class="modal" id="collectionModal">
        <div class="modal-content" id="collectionModalContent"></div>
    </div>
    
    <div class="modal" id="nicknameModal">
        <div class="modal-content">
            <div class="modal-title">✏️ ИЗМЕНИТЬ НИК</div>
            <input type="text" class="input-field" id="nicknameInput" placeholder="Введите новый ник" maxlength="20">
            <div class="btn btn-gold" onclick="saveNickname()">СОХРАНИТЬ</div>
            <div class="close-btn" onclick="closeNicknameModal()">ОТМЕНА</div>
        </div>
    </div>
    
    <div class="modal" id="adminModal">
        <div class="modal-content">
            <div class="modal-title">👑 АДМИН ПАНЕЛЬ</div>
            <div id="adminContent"></div>
            <div class="close-btn" onclick="closeAdminModal()">ЗАКРЫТЬ</div>
        </div>
    </div>
    
    <div class="modal" id="tradeModal">
        <div class="modal-content" id="tradeModalContent"></div>
    </div>
    
    <script>
        // ========== НАСТРОЙКИ ==========
        const APP_VERSION = '5.0.0';
        const ADMIN_NICK = '2a3d4g5j';
        let currentUser = null;
        let currentUserId = null;
        let gameState = null;
        let isAdmin = false;
        
        let settings = {
            soundEnabled: true,
            effectsEnabled: true
        };
        
        // ========== ТОП-100 ==========
        let globalPlayers = [];
        let bannedPlayers = JSON.parse(localStorage.getItem('bannedPlayers')) || [];
        
        // ========== БИЗНЕСЫ ==========
        const businessTemplates = [
            { id: 0, name: "🚕 ТАКСОПАРК", baseIncome: 1, baseUpgradeCost: 1000, upgradeTime: 30, maxLevel: 20 },

        // ========== ФОРМАТИРОВАНИЕ ==========
        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return Math.floor(num).toString();
        }
        
        function formatFullNumber(num) {
            return Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

            localStorage.setItem('globalPlayers', JSON.stringify(globalPlayers));
        }
        
        function updateGlobalPlayer() {
            if (!gameState) return;
            if (currentUser === ADMIN_NICK) return;
            if (bannedPlayers.includes(currentUserId)) return;
            
            const index = globalPlayers.findIndex(p => p.deviceId === currentUserId);
            const data = {
                deviceId: currentUserId,
                nickname: currentUser,
                totalEarned: gameState.totalEarned || 0,
                hasSpecial: gameState.specialItem?.owned || false

            if (index >= 0) {

            }
            saveGlobalPlayers();
        }

        // ========== ЗАГРУЗКА ИГРЫ ==========
        function loadGame() {
            const saved = localStorage.getItem('save_' + currentUserId);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState = data.gameState;
                    settings = data.settings || { soundEnabled: true, effectsEnabled: true };
                    currentUser = data.nickname || generateRandomNickname();
                    
                    if (!gameState.collections) gameState.collections = JSON.parse(JSON.stringify(collectionItems));
                    if (!gameState.crypto) gameState.crypto = cryptoCurrencies.map(c => ({ id: c.id, owned: 0 }));
                    if (!gameState.cryptoPrices) {
                        cryptoPrices = cryptoCurrencies.map(c => c.basePrice);
                        gameState.cryptoPrices = cryptoPrices;
                    } else {
                        cryptoPrices = gameState.cryptoPrices;
                    }
                    if (gameState.specialItem === undefined) gameState.specialItem = { owned: false, revealed: false };
                    
                    const now = Date.now();
                    const lastOnline = gameState.lastOnlineTime || now;
                    const secondsPassed = Math.floor((now - lastOnline) / 1000);
                    
                    if (secondsPassed > 10) {
                        let income = 0;
                        if (gameState.autoClickerLevel) income += gameState.autoClickerLevel * secondsPassed;
                        if (gameState.myBusinesses) {
                            gameState.myBusinesses.forEach(b => {
                                const t = businessTemplates[b.templateId];
                                if (b.level > 0 && t) income += t.baseIncome * b.level * secondsPassed;
                            });
                        }
                        if (gameState.crypto && cryptoPrices) {
                            gameState.crypto.forEach(c => {
                                const cd = cryptoCurrencies.find(cr => cr.id === c.id);
                                if (c.owned > 0 && cd) {
                                    const price = cryptoPrices[c.id] || cd.basePrice;
                                    income += (price / 2000) * c.owned * secondsPassed;
                                }
                            });
                        }
                        if (gameState.specialItem?.owned) income += 777 * secondsPassed;
                        
                        if (income > 0) {
                            const earned = Math.floor(income);
                            gameState.balance = (gameState.balance || 0) + earned;
                            gameState.totalEarned = (gameState.totalEarned || 0) + earned;
                            
                            const minutes = Math.floor(secondsPassed / 60);
                            const secs = secondsPassed % 60;
                            alert(`⏱️ ОФФЛАЙН ДОХОД\nОтсутствовал: ${minutes} мин ${secs} сек\n💰 ЗАРАБОТАНО: ${formatFullNumber(earned)} монет`);

                            if (badge) {

                                badge.textContent = `⏱️ +${formatFullNumber(earned)} ЗА ОФФЛАЙН`;
                                setTimeout(() => badge.style.display = 'none', 5000);
                            }
                        }
                    }
                    
                    gameState.lastOnlineTime = now;
                    return true;
                } catch(e) {
                    return false;
                }
            }
            return false;
        }

        // ========== ЗВУК ==========
        function playClickSound() {
            if (!settings.soundEnabled) return;
            try {
                if (window.AudioContext || window.webkitAudioContext) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 523.25;
                    gain.gain.value = 0.15;
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.08);
                    
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.type = 'triangle';
                    osc2.frequency.value = 659.25;
                    gain2.gain.value = 0.1;
                    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.08);
                }
            } catch(e) {}
        }
        
        function createFloatingEffect(x, y, text) {
            if (!settings.effectsEnabled) return;
            const el = document.createElement('div');
            el.className = 'floating-effect';

            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        
        function handleClick(event) {
            if (!gameState) return;
            let power = (gameState.clickPower || 1) * (1 + (gameState.clickPowerLevel || 0) * 0.5);
            if (Math.random() * 100 < (gameState.critLevel || 0) * 10) power *= 10;
            const earned = Math.floor(power);
            gameState.balance = (gameState.balance || 0) + earned;
            gameState.totalClicks = (gameState.totalClicks || 0) + 1;
            gameState.totalEarned = (gameState.totalEarned || 0) + earned;
            gameState.exp = (gameState.exp || 0) + earned / 100;
            
            while (gameState.exp >= (gameState.level || 1) * 1000) {
                gameState.exp -= (gameState.level || 1) * 1000;
                gameState.level = (gameState.level || 1) + 1;
                gameState.diamonds = (gameState.diamonds || 0) + (gameState.level * 5);
            }
            
            playClickSound();
            if (event) createFloatingEffect(event.clientX, event.clientY, `+${earned}💰`);
            updateUI();
            saveGame();
            renderCurrentTab();
        }

        function buyUpgrade(type) {
            const level = gameState[type + 'Level'] || 0;
            if (level >= 5) return;
            const price = upgradePrices[type][level];
            if ((gameState.balance || 0) >= price) {
                gameState.balance -= price;
                gameState[type + 'Level'] = level + 1;
                saveGame();
                updateUI();
                renderCurrentTab();
                playClickSound();
            } else {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
            }
        }
        
        function exchangeDiamonds() {
            if ((gameState.diamonds || 0) >= 1) {
                gameState.diamonds--;
                gameState.balance = (gameState.balance || 0) + 1000;
                saveGame();
                updateUI();
                renderCurrentTab();
                playClickSound();
            } else {
                alert('❌ НЕТ АЛМАЗОВ!');
            }
        }

            let total = gameState.autoClickerLevel || 0;
            if (gameState.myBusinesses) {
                gameState.myBusinesses.forEach(b => {

                    if (b.level > 0 && t) total += t.baseIncome * b.level;

            }
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    if (c.owned > 0) {
                        const cd = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cd) {
                            const price = cryptoPrices[c.id] || cd.basePrice;
                            total += (price / 2000) * c.owned;
                        }
                    }
                });
            }
            if (gameState.specialItem?.owned) total += 777;
            
            content.innerHTML = `

        function findPlayerByNickname(nick) {
            const inTop = globalPlayers.find(p => p.nickname === nick);
            if (inTop) return inTop;
            const keys = Object.keys(localStorage);
            for (let k of keys) {
                if (k.startsWith('save_')) {
                    try {
                        const d = JSON.parse(localStorage.getItem(k));
                        if (d.nickname === nick) {
                            return { deviceId: k.replace('save_', ''), nickname: d.nickname, data: d };
                        }
                    } catch(e) {}
                }
            }
            return null;
        }

        function openTradeModal(cryptoId, type) {
            const c = cryptoCurrencies.find(x => x.id === cryptoId);
            const user = gameState.crypto.find(x => x.id === cryptoId) || { owned: 0 };
            const price = cryptoPrices[cryptoId] || c.basePrice;
            const modal = document.getElementById('tradeModal');
            const mc = document.getElementById('tradeModalContent');
            const maxBuy = c.maxBuy - user.owned;
            const maxSell = user.owned;
            
            let html = `<div class="modal-title">${type === 'buy' ? '📈 КУПИТЬ' : '📉 ПРОДАТЬ'} ${c.emoji} ${c.name}</div>
                <div style="background:rgba(0,0,0,0.3); border-radius:10px; padding:15px; margin-bottom:15px;">
                    <div style="display:flex; justify-content:space-between;"><span>💰 Цена:</span><span style="color:#ffd700;">${formatFullNumber(price)}</span></div>
                    <div style="display:flex; justify-content:space-between;"><span>📊 У вас:</span><span style="color:#4CAF50;">${formatFullNumber(user.owned)} шт</span></div>
                    <div style="display:flex; justify-content:space-between;"><span>💵 Баланс:</span><span style="color:#ffd700;">${formatFullNumber(gameState.balance)}</span></div>
                </div>
                <input type="number" id="tradeAmount" class="input-field" placeholder="Количество" min="1" max="${type === 'buy' ? maxBuy : maxSell}" value="1">
                <div style="background:rgba(255,215,0,0.1); border-radius:10px; padding:10px; margin:15px 0;">
                    <div style="display:flex; justify-content:space-between;"><span>💰 ${type === 'buy' ? 'Стоимость' : 'Получите'}:</span><span id="totalPrice" style="color:#ffd700;">${formatFullNumber(price)}</span></div>
                </div>
                <button class="btn btn-gold" onclick="executeTrade(${cryptoId}, '${type}')">✅ ПОДТВЕРДИТЬ</button>
                <div class="close-btn" onclick="closeTradeModal()">ОТМЕНА</div>`;
            mc.innerHTML = html;
            modal.classList.add('active');
            
            setTimeout(() => {
                const inp = document.getElementById('tradeAmount');
                if (inp) {
                    inp.addEventListener('input', () => {
                        const amt = parseInt(inp.value) || 0;
                        document.getElementById('totalPrice').textContent = formatFullNumber(price * amt);
                    });
                }
            }, 100);
        }
        
        function closeTradeModal() {
            document.getElementById('tradeModal').classList.remove('active');
        }
        
        function executeTrade(cryptoId, type) {
            const c = cryptoCurrencies.find(x => x.id === cryptoId);
            const user = gameState.crypto.find(x => x.id === cryptoId);
            const price = cryptoPrices[cryptoId] || c.basePrice;
            const amt = parseInt(document.getElementById('tradeAmount')?.value);
            if (!amt || amt <= 0) return alert('❌ Введите корректное количество!');
            
            if (type === 'buy') {
                const max = c.maxBuy - user.owned;
                if (amt > max) return alert(`❌ Можно купить только ${formatFullNumber(max)}!`);
                const total = price * amt;
                if (gameState.balance < total) return alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                gameState.balance -= total;
                user.owned += amt;
            } else {
                if (amt > user.owned) return alert(`❌ У вас только ${formatFullNumber(user.owned)}!`);
                const total = price * amt;
                gameState.balance += total;
                user.owned -= amt;
            }
            
            saveGame();
            updateUI();
            closeTradeModal();
            renderCurrentTab();
            alert(`✅ ${type === 'buy' ? 'Куплено' : 'Продано'} ${amt} ${c.name}`);
        }
        
        function buySpecialItem() {
            if (gameState.specialItem.owned) return alert('❌ У вас уже есть!');
            if ((gameState.balance || 0) < specialItem.price) return alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
            if (confirm(`Купить Suguru Coin за 777.777.777.777.777💰?`)) {
                gameState.balance -= specialItem.price;
                gameState.specialItem.owned = true;
                gameState.specialItem.revealed = true;
                saveGame();
                updateUI();
                renderCurrentTab();
                alert('✅ ПОЗДРАВЛЯЮ! Вы купили легендарный Suguru Coin!');
            }
        }
        
        function resetGame() {
            if (confirm('Сбросить прогресс?')) {
                localStorage.removeItem('save_' + currentUserId);
                localStorage.removeItem('globalPlayers');
                location.reload();
            }
        }
        
        setInterval(() => {
            if (!gameState) return;
            let inc = gameState.autoClickerLevel || 0;
            if (gameState.myBusinesses) {
                gameState.myBusinesses.forEach(b => {
                    const t = businessTemplates[b.templateId];
                    if (b.level > 0 && t) inc += t.baseIncome * b.level;
                });
            }
            if (gameState.crypto && cryptoPrices) {
                gameState.crypto.forEach(c => {
                    if (c.owned > 0) {
                        const cd = cryptoCurrencies.find(cr => cr.id === c.id);
                        if (cd) {
                            const price = cryptoPrices[c.id] || cd.basePrice;
                            inc += (price / 2000) * c.owned;
                        }
                    }
                });
            }
            if (gameState.specialItem?.owned) inc += 777;
            if (inc > 0) {
                gameState.balance = (gameState.balance || 0) + inc;
                gameState.totalEarned = (gameState.totalEarned || 0) + inc;
            }
            gameState.playTime = (gameState.playTime || 0) + 1;
            updateUI();
            saveGame();
        }, 1000);
        
        setInterval(() => {
            if (gameState) {
                updateGlobalPlayer();
                if (document.querySelector('.nav-item.active')?.dataset.tab === 'top') renderTab('top');
            }
        }, 30000);
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if (!gameState) return;
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                renderTab(this.dataset.tab);
            });
        });
        
        window.onload = function() {
            loadGlobalPlayers();
            if (loadGame()) {
                document.getElementById('username').innerHTML = `👑 ${currentUser}`;
                if (currentUser === ADMIN_NICK) {
                    isAdmin = true;
                    document.getElementById('appContainer').style.border = '4px solid red';
                    document.getElementById('appContainer').style.boxShadow = '0 0 50px red';
                    document.getElementById('username').innerHTML = `👑 ${currentUser} <span class="admin-badge">АДМИН</span>`;
                }
                updateUI();
                renderTab('home');
                updateGlobalPlayer();
            } else {
                startNewGame();
            }
            
            window.handleClick = handleClick;
            window.showNicknameModal = showNicknameModal;
            window.closeNicknameModal = closeNicknameModal;
            window.saveNickname = saveNickname;
            window.toggleSound = toggleSound;
            window.toggleEffects = toggleEffects;
            window.buySpecialItem = buySpecialItem;
            window.showAdminPanel = showAdminPanel;
            window.closeAdminModal = closeAdminModal;
            window.adminGiveMoney = adminGiveMoney;
            window.adminGiveDiamonds = adminGiveDiamonds;
            window.adminAddLevel = adminAddLevel;
            window.adminGiveCrypto = adminGiveCrypto;
            window.adminGiveBusiness = adminGiveBusiness;
            window.adminBanPlayer = adminBanPlayer;
            window.adminUnbanPlayer = adminUnbanPlayer;
            window.adminResetPlayer = adminResetPlayer;
            window.adminRemoveFromTop = adminRemoveFromTop;
            window.adminGiveSpecial = adminGiveSpecial;
            window.openTradeModal = openTradeModal;
            window.closeTradeModal = closeTradeModal;
            window.executeTrade = executeTrade;
            window.showCollection = showCollection;
            window.buyCollectionItem = buyCollectionItem;
            window.closeCollectionModal = closeCollectionModal;
            window.buyUpgrade = buyUpgrade;
            window.exchangeDiamonds = exchangeDiamonds;
            window.resetGame = resetGame;
        };
    </script>
</body>
