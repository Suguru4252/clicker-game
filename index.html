<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ТЕСТ КОСМИЧЕСКОЙ ПРОГРАММЫ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .test-container {
            max-width: 800px;
            width: 100%;
            background: #0f1117;
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #ffd700;
            color: white;
        }
        
        h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .space-container {
            background: linear-gradient(135deg, #000428, #004e92);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            min-height: 400px;
            border: 2px solid #ffd700;
        }
        
        /* Звезды */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(1); }
        }
        
        /* Планеты */
        .planet {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3);
            animation: float 20s infinite ease-in-out;
        }
        
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
        
        .planet-1 {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b6b, #c92a2a);
            top: 50px;
            right: 50px;
            animation-delay: 0s;
        }
        
        .planet-2 {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #4dabf7, #1971c2);
            bottom: 50px;
            left: 30px;
            animation-delay: 2s;
        }
        
        .planet-3 {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ffd43b, #e67700);
            top: 150px;
            left: 100px;
            animation-delay: 1s;
        }
        
        /* Ракета */
        .rocket {
            position: absolute;
            width: 100px;
            height: 200px;
            left: 50%;
            transform: translateX(-50%);
            bottom: 50px;
            transition: bottom 3s ease-in-out;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.5));
            z-index: 10;
        }
        
        .rocket.launch {
            bottom: 800px;
        }
        
        .rocket-body {
            position: relative;
            width: 60px;
            height: 120px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            border-radius: 50% 50% 30% 30%;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }
        
        .rocket-window {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #87CEEB;
            border-radius: 50%;
            top: 30px;
            left: 20px;
            border: 2px solid white;
            animation: blink 2s infinite;
        }
        
        @keyframes blink {
            0% { background: #87CEEB; }
            50% { background: #ffffff; }
            100% { background: #87CEEB; }
        }
        
        .rocket-fin {
            position: absolute;
            width: 30px;
            height: 40px;
            background: linear-gradient(135deg, #ff6b6b, #c92a2a);
            bottom: -10px;
        }
        
        .rocket-fin.left {
            left: -20px;
            transform: skewY(30deg);
            border-radius: 0 0 0 20px;
        }
        
        .rocket-fin.right {
            right: -20px;
            transform: skewY(-30deg);
            border-radius: 0 0 20px 0;
        }
        
        .rocket-fire {
            position: absolute;
            width: 30px;
            height: 50px;
            background: linear-gradient(to top, #ffd700, #ff6b6b);
            bottom: -40px;
            left: 15px;
            border-radius: 50%;
            animation: fire 0.2s infinite;
        }
        
        @keyframes fire {
            0% { height: 50px; opacity: 1; }
            50% { height: 70px; opacity: 0.8; }
            100% { height: 50px; opacity: 1; }
        }
        
        /* Уровни космоса */
        .levels {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
            position: relative;
            z-index: 20;
        }
        
        .level {
            flex: 1;
            text-align: center;
            padding: 15px 5px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            border: 1px solid #2a2c36;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .level.unlocked {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .level.current {
            border: 3px solid #ffd700;
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }
        
        .level-number {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-name {
            font-size: 12px;
            color: #8e8e98;
            margin: 5px 0;
        }
        
        .level-price {
            font-size: 14px;
            color: #4caf50;
            font-weight: bold;
        }
        
        .level-bonus {
            font-size: 11px;
            color: #ffd700;
            margin-top: 5px;
        }
        
        /* Статистика */
        .stats {
            display: flex;
            justify-content: space-around;
            background: #1a1c24;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #2a2c36;
            margin-bottom: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8e8e98;
            margin-top: 5px;
        }
        
        /* Кнопки */
        .buy-btn {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            border: none;
            color: black;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 18px;
            margin-bottom: 20px;
            transition: transform 0.1s;
        }
        
        .buy-btn:active {
            transform: scale(0.95);
        }
        
        .buy-btn.disabled {
            background: #2a2c36;
            color: #8e8e98;
            cursor: not-allowed;
        }
        
        .test-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .test-btn {
            flex: 1;
            background: #2a2c36;
            border: 1px solid #ffd700;
            color: white;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        
        .test-btn:active {
            background: #3a3c46;
        }
        
        /* Прогресс-бар */
        .progress-bar {
            height: 10px;
            background: #2a2c36;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            width: 0%;
            border-radius: 5px;
            transition: width 0.5s;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🚀 КОСМИЧЕСКАЯ ПРОГРАММА</h1>
        
        <div class="space-container" id="spaceContainer">
            <div class="stars" id="stars"></div>
            
            <!-- Планеты -->
            <div class="planet planet-1"></div>
            <div class="planet planet-2"></div>
            <div class="planet planet-3"></div>
            
            <!-- Ракета -->
            <div class="rocket" id="rocket">
                <div class="rocket-body">
                    <div class="rocket-window"></div>
                    <div class="rocket-fin left"></div>
                    <div class="rocket-fin right"></div>
                </div>
                <div class="rocket-fire" id="rocketFire"></div>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="currentLevel">0</div>
                <div class="stat-label">ТЕКУЩИЙ УРОВЕНЬ</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalBonus">0</div>
                <div class="stat-label">БОНУС %</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="nextPrice">1B</div>
                <div class="stat-label">ЦЕНА</div>
            </div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
        </div>
        
        <div class="levels" id="levels"></div>
        
        <button class="buy-btn" id="buyBtn" onclick="buyLevel()">🚀 ЗАПУСТИТЬ РАКЕТУ</button>
        
        <div class="test-controls">
            <div class="test-btn" onclick="addMoney()">💰 +1B</div>
            <div class="test-btn" onclick="addMoney(10)">💰 +10B</div>
            <div class="test-btn" onclick="resetTest()">🔄 СБРОС</div>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        const SPACE_LEVELS = [
            { name: "🚀 СПУТНИК", bonus: 10, price: 1e9, desc: "+10% к майнингу" },
            { name: "🛰️ ОРБИТАЛЬНАЯ СТАНЦИЯ", bonus: 20, price: 1e10, desc: "+20% к майнингу" },
            { name: "🌕 ЛУННАЯ БАЗА", bonus: 30, price: 1e11, desc: "+30% + новая крипта" },
            { name: "🔴 МАРСИАНСКАЯ КОЛОНИЯ", bonus: 50, price: 1e12, desc: "+50% к доходу" },
            { name: "💫 ПОЯС АСТЕРОИДОВ", bonus: 75, price: 1e13, desc: "Алмазы с неба" },
            { name: "🪐 СТАНЦИЯ НА ЮПИТЕРЕ", bonus: 100, price: 1e14, desc: "х2 доход" },
            { name: "⬆️ КОСМИЧЕСКИЙ ЛИФТ", bonus: 150, price: 1e15, desc: "Мгновенные улучшения" },
            { name: "⭐ ЗВЕЗДА", bonus: 200, price: 1e16, desc: "Своя звезда" },
            { name: "🌌 ГАЛАКТИКА", bonus: 300, price: 1e17, desc: "Телепортация" },
            { name: "🌀 ВСЕЛЕННАЯ", bonus: 500, price: 1e18, desc: "Властелин космоса" }
        ];
        
        let gameState = {
            balance: 5e9, // 5B для теста
            spaceLevel: 0,
            unlockedLevels: [0] // 0 уровень разблокирован
        };
        
        // ========== ГЕНЕРАЦИЯ ЗВЕЗД ==========
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            starsContainer.innerHTML = '';
            
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                
                starsContainer.appendChild(star);
            }
        }
        
        // ========== ФОРМАТИРОВАНИЕ ==========
        function formatNumber(num) {
            if (num >= 1e18) return (num / 1e18).toFixed(1) + 'Qi';
            if (num >= 1e15) return (num / 1e15).toFixed(1) + 'Q';
            if (num >= 1e12) return (num / 1e12).toFixed(1) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toString();
        }
        
        // ========== ПОКУПКА УРОВНЯ ==========
        function buyLevel() {
            const nextLevel = gameState.spaceLevel;
            
            if (nextLevel >= SPACE_LEVELS.length) {
                alert('❌ ВЫ УЖЕ ПОКОРИЛИ ВСЕЛЕННУЮ!');
                return;
            }
            
            const levelData = SPACE_LEVELS[nextLevel];
            
            if (gameState.balance < levelData.price) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= levelData.price;
            gameState.spaceLevel++;
            gameState.unlockedLevels.push(gameState.spaceLevel);
            
            // Запускаем ракету
            launchRocket();
            
            renderUI();
        }
        
        // ========== ЗАПУСК РАКЕТЫ ==========
        function launchRocket() {
            const rocket = document.getElementById('rocket');
            const fire = document.getElementById('rocketFire');
            
            rocket.classList.add('launch');
            fire.style.animation = 'fire 0.1s infinite';
            
            setTimeout(() => {
                rocket.classList.remove('launch');
                fire.style.animation = 'fire 0.2s infinite';
            }, 3000);
        }
        
        // ========== РЕНДЕР ==========
        function renderUI() {
            const currentLevel = document.getElementById('currentLevel');
            const totalBonus = document.getElementById('totalBonus');
            const nextPrice = document.getElementById('nextPrice');
            const progressBar = document.getElementById('progressBar');
            const levelsContainer = document.getElementById('levels');
            const buyBtn = document.getElementById('buyBtn');
            
            const totalBonusValue = SPACE_LEVELS.slice(0, gameState.spaceLevel).reduce((sum, l) => sum + l.bonus, 0);
            
            currentLevel.textContent = gameState.spaceLevel;
            totalBonus.textContent = totalBonusValue;
            progressBar.style.width = (gameState.spaceLevel / SPACE_LEVELS.length) * 100 + '%';
            
            if (gameState.spaceLevel < SPACE_LEVELS.length) {
                const nextLevelData = SPACE_LEVELS[gameState.spaceLevel];
                nextPrice.textContent = formatNumber(nextLevelData.price);
                buyBtn.textContent = `🚀 ЗАПУСТИТЬ РАКЕТУ (${formatNumber(nextLevelData.price)})`;
                buyBtn.classList.toggle('disabled', gameState.balance < nextLevelData.price);
            } else {
                nextPrice.textContent = 'MAX';
                buyBtn.textContent = '✅ ВСЕЛЕННАЯ ПОКОРЕНА';
                buyBtn.classList.add('disabled');
            }
            
            // Рендер уровней
            let levelsHtml = '';
            SPACE_LEVELS.forEach((level, index) => {
                const isUnlocked = index <= gameState.spaceLevel;
                const isCurrent = index === gameState.spaceLevel - 1;
                
                levelsHtml += `
                    <div class="level ${isUnlocked ? 'unlocked' : ''} ${isCurrent ? 'current' : ''}">
                        <div class="level-number">${index + 1}</div>
                        <div class="level-name">${level.name}</div>
                        <div class="level-price">${formatNumber(level.price)}</div>
                        <div class="level-bonus">+${level.bonus}%</div>
                    </div>
                `;
            });
            
            levelsContainer.innerHTML = levelsHtml;
        }
        
        // ========== ТЕСТОВЫЕ ФУНКЦИИ ==========
        function addMoney(multiplier = 1) {
            gameState.balance += 1e9 * multiplier;
            renderUI();
        }
        
        function resetTest() {
            gameState = {
                balance: 5e9,
                spaceLevel: 0,
                unlockedLevels: [0]
            };
            renderUI();
        }
        
        // ========== ЗАПУСК ==========
        window.onload = function() {
            generateStars();
            renderUI();
            
            window.buyLevel = buyLevel;
            window.addMoney = addMoney;
            window.resetTest = resetTest;
        };
    </script>
</body>
</html>
