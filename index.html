<!DOCTYPE html>

    <style>

<body>
    <div class="app-container">
        <div class="header" id="header" style="display: none;">
            <div class="username" id="username">
                👑 ИГРОК
                <span class="warning-badge" id="warningBadge">⚠️ ЛОКАЛЬНО</span>
            </div>
            <div class="offline-badge" id="offlineBadge" style="display:none;">⏱️ ОФФЛАЙН ДОХОД</div>
            
            <div class="balance-container">
                <div class="balance-box">
                    <div class="balance-label">💰 МОНЕТЫ</div>
                    <div class="balance-value" id="balance">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">💎 АЛМАЗЫ</div>
                    <div class="balance-value" id="diamonds">10</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">📊 УРОВЕНЬ</div>
                    <div class="balance-value" id="level">1</div>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
        </div>
        
        <div class="content" id="content"></div>
        
        <div class="bottom-nav" id="bottomNav" style="display: none;">
            <div class="nav-item active" data-tab="home"><span>🏠</span>ГЛАВНАЯ</div>
            <div class="nav-item" data-tab="mybusiness"><span>💼</span>БИЗНЕСЫ</div>
            <div class="nav-item" data-tab="property"><span>🏰</span>НЕДВИЖ.</div>
            <div class="nav-item" data-tab="shop"><span>🏪</span>МАГАЗИН</div>
            <div class="nav-item" data-tab="top"><span>🏆</span>ТОП-100</div>
            <div class="nav-item" data-tab="stats"><span>📊</span>СТАТИС.</div>
            <div class="nav-item" data-tab="settings"><span>⚙️</span>НАСТР.</div>
        </div>
    </div>
    
    <div class="modal" id="businessModal">
        <div class="modal-content" id="businessModalContent"></div>
    </div>
    
    <div class="modal" id="propertyModal">
        <div class="modal-content" id="propertyModalContent"></div>
    </div>
    
    <div class="modal" id="nicknameModal">
        <div class="modal-content">
            <div class="modal-title">✏️ ИЗМЕНИТЬ НИК</div>
            <input type="text" class="input-field" id="nicknameInput" placeholder="Введите новый ник" maxlength="20">
            <div class="btn btn-gold" onclick="saveNickname()">СОХРАНИТЬ</div>
            <div class="close-btn" onclick="closeNicknameModal()">ОТМЕНА</div>
        </div>
    </div>
    
    <script>
        // Telegram
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ========== НАСТРОЙКИ ==========
        const APP_VERSION = '1.1.0';
        let currentUser = "ИГРОК";
        let gameState = null;
        
        // Настройки
        let settings = {
            soundEnabled: true,
            effectsEnabled: true
        };
        
        // ========== ТОП-100 ==========
        let topPlayers = [];
        
        // Загрузка топа
        function loadTopPlayers() {
            const saved = localStorage.getItem('imperiaTopPlayers');
            if (saved) {
                try {
                    topPlayers = JSON.parse(saved);
                } catch(e) {
                    topPlayers = [];
                }
            } else {
                topPlayers = [];
            }
        }
        
        // Сохранение топа
        function saveTopPlayers() {
            topPlayers.sort((a, b) => b.totalEarned - a.totalEarned);
            if (topPlayers.length > 100) {
                topPlayers = topPlayers.slice(0, 100);
            }
            localStorage.setItem('imperiaTopPlayers', JSON.stringify(topPlayers));
        }
        
        // Обновление топа
        function updateTopPlayers() {
            if (!gameState) return;
            
            const existingIndex = topPlayers.findIndex(p => p.nickname === currentUser);
            
            const playerData = {
                nickname: currentUser,
                totalEarned: gameState.totalEarned || 0,
                lastUpdate: Date.now()
            };
            
            if (existingIndex >= 0) {
                topPlayers[existingIndex] = playerData;
            } else {
                topPlayers.push(playerData);
            }
            
            saveTopPlayers();
        }
        
        // Получить место игрока
        function getPlayerRank() {
            const index = topPlayers.findIndex(p => p.nickname === currentUser);
            return index >= 0 ? index + 1 : 100;
        }
        
        // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
        
        function loadGame() {
            const saved = localStorage.getItem('imperiaClickerSave');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState = data.gameState;
                    settings = data.settings || { soundEnabled: true, effectsEnabled: true };
                    currentUser = data.nickname || "ИГРОК";
                    
                    // Обновляем время последнего входа
                    const now = Date.now();
                    const lastOnline = gameState.lastOnlineTime || now;
                    const secondsPassed = Math.floor((now - lastOnline) / 1000);
                    
                    if (secondsPassed > 10) {
                        calculateOfflineEarnings(secondsPassed);
                    }
                    
                    gameState.lastOnlineTime = now;
                    
                    return true;
                } catch(e) {
                    return false;
                }
            }
            return false;
        }

        function calculateOfflineEarnings(seconds) {
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel * seconds;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const t = businessTemplates[b.templateId];
                    if (b.level > 0 && t) {
                        income += t.baseIncome * b.level * seconds;
                    }
                });
            }
            
            if (income > 0) {
                const earned = Math.floor(income);
                gameState.balance = (gameState.balance || 0) + earned;
                gameState.totalEarned = (gameState.totalEarned || 0) + earned;
                
                const minutes = Math.floor(seconds / 60);
                const secs = seconds % 60;
                
                setTimeout(() => {
                    alert(`⏱️ ОФФЛАЙН ДОХОД\nОтсутствовал: ${minutes} мин ${secs} сек\nЗаработано: ${formatNumber(earned)} монет`);

        // Звук клика
        function playClickSound() {
            if (!settings.soundEnabled) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.1;
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }
        
        // Эффект всплывающей монетки
        function createFloatingEffect(x, y, text) {
            if (!settings.effectsEnabled) return;
            const el = document.createElement('div');
            el.className = 'floating-effect';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        
        function handleClick(event) {
            if (!gameState) return;
            
            let power = (gameState.clickPower || 1) * (1 + (gameState.clickPowerLevel || 0) * 0.5);
            
            if (Math.random() * 100 < (gameState.critLevel || 0) * 10) {
                power *= 10;
            }
            
            const earned = Math.floor(power);
            gameState.balance = (gameState.balance || 0) + earned;
            gameState.totalClicks = (gameState.totalClicks || 0) + 1;
            gameState.totalEarned = (gameState.totalEarned || 0) + earned;
            gameState.exp = (gameState.exp || 0) + earned / 100;
            
            while (gameState.exp >= (gameState.level || 1) * 1000) {
                gameState.exp -= (gameState.level || 1) * 1000;
                gameState.level = (gameState.level || 1) + 1;
                gameState.diamonds = (gameState.diamonds || 0) + (gameState.level * 5);
            }
            
            playClickSound();
            if (event) {
                createFloatingEffect(event.clientX, event.clientY, `+${earned}💰`);
            }
            
            updateUI();
            saveGame();
            renderCurrentTab();
        }

        function startUpgrade(index) {
            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            if ((business.level || 1) >= t.maxLevel) {
                alert('❌ МАКСИМАЛЬНЫЙ УРОВЕНЬ!');
                return;
            }
            
            if (business.upgradeEnd && business.upgradeEnd > Date.now()) {
                alert('⏱️ УЛУЧШЕНИЕ УЖЕ ИДЕТ!');
                return;
            }
            
            if ((gameState.balance || 0) < (business.upgradeCost || 0)) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= (business.upgradeCost || 0);
            
            business.lastUpgrade = Date.now();
            business.upgradeEnd = Date.now() + ((business.upgradeTime || t.upgradeTime) * 1000);
            
            saveGame();
            updateUI();
            closeBusinessModal();
            renderCurrentTab();
            
            alert(`✅ Улучшение запущено на ${business.upgradeTime || t.upgradeTime} сек.`);
            
            setTimeout(() => {
                if (business.upgradeEnd && business.upgradeEnd <= Date.now() && (business.level || 1) < t.maxLevel) {
                    business.level = (business.level || 1) + 1;
                    business.upgradeCost = Math.floor((business.upgradeCost || t.baseUpgradeCost) * 2.5);
                    business.upgradeTime = Math.floor((business.upgradeTime || t.upgradeTime) * 1.3);
                    business.upgradeEnd = 0;
                    
                    saveGame();
                    updateUI();
                    renderCurrentTab();
                    
                    alert(`✅ ${t.name} улучшен до ${business.level} уровня!`);

            }, (business.upgradeTime || t.upgradeTime) * 1000);

            const business = gameState.myBusinesses[index];
            if (!business) return;
            
            const t = businessTemplates[business.templateId];
            if (!t) return;
            
            let totalSpent = t.baseUpgradeCost;
            let currentCost = t.baseUpgradeCost;
            for (let i = 1; i < (business.level || 1); i++) {
                currentCost = Math.floor(currentCost * 2.5);
                totalSpent += currentCost;
            }
            
            const sellPrice = Math.floor(totalSpent * 0.5);
            
            if (confirm(`Продать ${t.name} за ${formatNumber(sellPrice)}💰?`)) {
                gameState.myBusinesses.splice(index, 1);
                gameState.balance = (gameState.balance || 0) + sellPrice;
                
                saveGame();
                updateUI();
                closeBusinessModal();
                renderCurrentTab();
                alert(`✅ Продано! +${formatNumber(sellPrice)}💰`);
            }
        }
        
        function closeBusinessModal() {
            document.getElementById('businessModal').classList.remove('active');
        }
        
        function checkBusinessUpgrades() {
            if (!gameState || !gameState.myBusinesses) return;
            
            const now = Date.now();
            
            gameState.myBusinesses.forEach(business => {
                const t = businessTemplates[business.templateId];
                if (!t) return;
                
                if (business.upgradeEnd && business.upgradeEnd > 0 && business.upgradeEnd <= now && (business.level || 1) < t.maxLevel) {
                    business.level = (business.level || 1) + 1;
                    business.upgradeCost = Math.floor((business.upgradeCost || t.baseUpgradeCost) * 2.5);
                    business.upgradeTime = Math.floor((business.upgradeTime || t.upgradeTime) * 1.3);
                    business.upgradeEnd = 0;
                    
                    saveGame();
                    renderCurrentTab();
                }
            });
        }
        
        // ========== НЕДВИЖИМОСТЬ ==========
        
        function renderProperty(content) {
            const housesOwned = gameState.houses ? gameState.houses.filter(h => h && h.owned).length : 0;
            const carsOwned = gameState.cars ? gameState.cars.filter(c => c && c.owned).length : 0;
            const planesOwned = gameState.planes ? gameState.planes.filter(p => p && p.owned).length : 0;
            const shipsOwned = gameState.ships ? gameState.ships.filter(s => s && s.owned).length : 0;
            
            content.innerHTML = `
                <div class="card">
                    <div class="card-title">🏰 НЕДВИЖИМОСТЬ</div>
                    
                    <div class="property-grid">
                        <div class="property-category" onclick="showPropertyCategory('houses')">
                            <span>🏠</span>
                            <div class="category-name">ДОМА</div>
                            <div class="category-count">${housesOwned}/4</div>
                        </div>
                        <div class="property-category" onclick="showPropertyCategory('cars')">
                            <span>🚗</span>
                            <div class="category-name">МАШИНЫ</div>
                            <div class="category-count">${carsOwned}/4</div>
                        </div>
                        <div class="property-category" onclick="showPropertyCategory('planes')">
                            <span>✈️</span>
                            <div class="category-name">САМОЛЕТЫ</div>
                            <div class="category-count">${planesOwned}/4</div>
                        </div>
                        <div class="property-category" onclick="showPropertyCategory('ships')">
                            <span>🚢</span>
                            <div class="category-name">КОРАБЛИ</div>
                            <div class="category-count">${shipsOwned}/4</div>
                        </div>
                    </div>
                    
                    <div class="btn btn-gold" onclick="showGarage()">🚗 МОЙ ГАРАЖ</div>
                    <div class="btn btn-gold" onclick="showMyHouses()">🏠 МОИ ДОМА</div>
                    <div class="btn btn-gold" onclick="showMyPlanes()">✈️ МОИ САМОЛЕТЫ</div>
                    <div class="btn btn-gold" onclick="showMyShips()">🚢 МОИ КОРАБЛИ</div>
                </div>
            `;
        }
        
        function showPropertyCategory(category) {
            const items = gameState[category];
            if (!items) return;
            
            const titles = {
                houses: '🏠 ДОМА',
                cars: '🚗 МАШИНЫ',
                planes: '✈️ САМОЛЕТЫ',
                ships: '🚢 КОРАБЛИ'
            };
            
            const modal = document.getElementById('propertyModal');
            const modalContent = document.getElementById('propertyModalContent');
            
            let html = `<div class="modal-title">${titles[category]}</div>`;
            
            items.forEach(item => {
                if (!item) return;
                html += `
                    <div class="property-item">
                        <div class="property-emoji">${item.emoji || '🏠'}</div>
                        <div class="property-details">
                            <div class="property-title">${item.name || ''}</div>
                            <div class="property-price">💰 ${formatNumber(item.price || 0)}</div>
                            <div class="property-income">⏱️ +${item.income || 0}/ЧАС</div>
                        </div>
                        ${item.owned ? 
                            '<span class="property-owned">ВЛАДЕЮ</span>' : 
                            `<div class="btn btn-small" onclick="buyProperty('${category}', ${item.id})">КУПИТЬ</div>`
                        }
                    </div>
                `;
            });
            
            html += '<div class="close-btn" onclick="closePropertyModal()">◀ НАЗАД</div>';
            
            modalContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function buyProperty(category, id) {
            const item = gameState[category][id];
            if (!item || item.owned) return;
            
            if ((gameState.balance || 0) < (item.price || 0)) {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
                return;
            }
            
            gameState.balance -= item.price;
            item.owned = true;
            
            saveGame();
            updateUI();
            closePropertyModal();
            showPropertyCategory(category);
            renderCurrentTab();
        }
        
        function showGarage() {
            const items = gameState.cars ? gameState.cars.filter(c => c && c.owned) : [];
            showOwnedItems('🚗 МОЙ ГАРАЖ', items);
        }
        
        function showMyHouses() {
            const items = gameState.houses ? gameState.houses.filter(h => h && h.owned) : [];
            showOwnedItems('🏠 МОИ ДОМА', items);
        }
        
        function showMyPlanes() {
            const items = gameState.planes ? gameState.planes.filter(p => p && p.owned) : [];
            showOwnedItems('✈️ МОИ САМОЛЕТЫ', items);
        }
        
        function showMyShips() {
            const items = gameState.ships ? gameState.ships.filter(s => s && s.owned) : [];
            showOwnedItems('🚢 МОИ КОРАБЛИ', items);
        }
        
        function showOwnedItems(title, items) {
            const modal = document.getElementById('propertyModal');
            const modalContent = document.getElementById('propertyModalContent');
            
            let html = `<div class="modal-title">${title}</div>`;
            
            if (items.length === 0) {
                html += '<div style="text-align:center; padding:20px;">У ВАС НЕТ</div>';
            } else {
                items.forEach(item => {
                    html += `
                        <div class="property-item">
                            <div class="property-emoji">${item.emoji || '🏠'}</div>
                            <div class="property-details">
                                <div class="property-title">${item.name || ''}</div>
                                <div class="property-income">⏱️ +${item.income || 0}/ЧАС</div>
                            </div>
                            <span class="property-owned">ВЛАДЕЮ</span>
                        </div>
                    `;
                });
            }
            
            html += '<div class="close-btn" onclick="closePropertyModal()">◀ НАЗАД</div>';
            
            modalContent.innerHTML = html;
            modal.classList.add('active');
        }
        
        function closePropertyModal() {
            document.getElementById('propertyModal').classList.remove('active');
        }
        
        // ========== МАГАЗИН ==========
        
        function renderShop(content) {
            let html = '<div class="card"><div class="card-title">🏪 МАГАЗИН УЛУЧШЕНИЙ</div>';
            
            if ((gameState.clickPowerLevel || 0) < 5) {
                html += `
                    <div class="shop-item">
                        <div class="item-info">
                            <div class="item-name">💪 СИЛА КЛИКА +${(gameState.clickPowerLevel || 0) + 1}</div>
                            <div class="item-price">💰 ${formatNumber(upgradePrices.clickPower[gameState.clickPowerLevel || 0])}</div>
                        </div>
                        <button class="buy-btn" onclick="buyUpgrade('clickPower')">↑</button>
                    </div>
                `;
            }
            
            if ((gameState.autoClickerLevel || 0) < 5) {
                html += `
                    <div class="shop-item">
                        <div class="item-info">
                            <div class="item-name">🤖 АВТОКЛИКЕР +${(gameState.autoClickerLevel || 0) + 1}</div>
                            <div class="item-price">💰 ${formatNumber(upgradePrices.autoClicker[gameState.autoClickerLevel || 0])}</div>
                        </div>
                        <button class="buy-btn" onclick="buyUpgrade('autoClicker')">↑</button>
                    </div>
                `;
            }
            
            if ((gameState.critLevel || 0) < 5) {
                html += `
                    <div class="shop-item">
                        <div class="item-info">
                            <div class="item-name">⚡ КРИТ +10%</div>
                            <div class="item-price">💰 ${formatNumber(upgradePrices.crit[gameState.critLevel || 0])}</div>
                        </div>
                        <button class="buy-btn" onclick="buyUpgrade('crit')">↑</button>
                    </div>
                `;
            }
            
            html += `
                <div class="shop-item">
                    <div class="item-info">
                        <div class="item-name">💎 ОБМЕН АЛМАЗОВ</div>
                        <div class="item-desc">1💎 = 1000💰</div>
                    </div>
                    <button class="buy-btn" onclick="exchangeDiamonds()">ОБМЕН</button>
                </div>
            `;
            
            html += '</div>';
            content.innerHTML = html;
        }
        
        function buyUpgrade(type) {
            const level = gameState[type + 'Level'] || 0;
            if (level >= 5) return;
            
            const price = upgradePrices[type][level];
            
            if ((gameState.balance || 0) >= price) {
                gameState.balance -= price;
                gameState[type + 'Level'] = level + 1;
                
                saveGame();
                updateUI();
                renderCurrentTab();
                playClickSound();
            } else {
                alert('❌ НЕДОСТАТОЧНО МОНЕТ!');
            }
        }
        
        function exchangeDiamonds() {
            if ((gameState.diamonds || 0) >= 1) {
                gameState.diamonds--;
                gameState.balance = (gameState.balance || 0) + 1000;
                
                saveGame();
                updateUI();
                renderCurrentTab();
                playClickSound();
            } else {
                alert('❌ НЕТ АЛМАЗОВ!');
            }
        }
        
        // ========== СТАТИСТИКА ==========
        
        function renderStats(content) {
            let totalIncome = gameState.autoClickerLevel || 0;
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const t = businessTemplates[b.templateId];
                    if (b.level > 0 && t) {
                        totalIncome += t.baseIncome * b.level;
                    }
                });
            }
            
            const ownedBusinesses = gameState.myBusinesses ? gameState.myBusinesses.length : 0;
            const ownedProperties = [
                ...(gameState.houses || []).filter(h => h && h.owned),
                ...(gameState.cars || []).filter(c => c && c.owned),
                ...(gameState.planes || []).filter(p => p && p.owned),
                ...(gameState.ships || []).filter(s => s && s.owned)
            ].length;
            
            content.innerHTML = `
                <div class="card">
                    <div class="card-title">📊 СТАТИСТИКА</div>
                    
                    <div class="property-item" style="justify-content:space-between;">
                        <span>👆 ВСЕГО КЛИКОВ</span>
                        <span style="color:#ffd700;">${formatNumber(gameState.totalClicks || 0)}</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>💰 ЗАРАБОТАНО</span>
                        <span style="color:#ffd700;">${formatNumber(gameState.totalEarned || 0)}</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>⏱️ ДОХОД/СЕК</span>
                        <span style="color:#ffd700;">${Math.floor(totalIncome)}</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>💼 БИЗНЕСОВ</span>
                        <span style="color:#ffd700;">${ownedBusinesses}/100</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>🏠 ИМУЩЕСТВА</span>
                        <span style="color:#ffd700;">${ownedProperties}/16</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>🎮 В ИГРЕ</span>
                        <span style="color:#ffd700;">${Math.floor((gameState.playTime || 0) / 60)} МИН</span>
                    </div>
                    <div class="property-item" style="justify-content:space-between;">
                        <span>💎 АЛМАЗЫ</span>
                        <span style="color:#ffd700;">${gameState.diamonds || 0}</span>
                    </div>
                    
                    <div style="margin-top:20px;">
                        <button class="btn btn-danger" onclick="resetGame()">🔄 СБРОСИТЬ ПРОГРЕСС</button>
                    </div>
                </div>
            `;
        }
        
        // ========== НАСТРОЙКИ ==========
        
        function renderSettings(content) {
            content.innerHTML = `
                <div class="card">
                    <div class="card-title">⚙️ НАСТРОЙКИ</div>
                    
                    <div class="settings-group">
                        <div class="settings-item">
                            <span class="settings-label">🔊 ЗВУК КЛИКА</span>
                            <div class="settings-switch ${settings.soundEnabled ? 'active' : ''}" onclick="toggleSound()"></div>
                        </div>
                        <div class="settings-item">
                            <span class="settings-label">✨ ЭФФЕКТЫ</span>
                            <div class="settings-switch ${settings.effectsEnabled ? 'active' : ''}" onclick="toggleEffects()"></div>
                        </div>
                    </div>
                    
                    <div class="settings-group">
                        <div class="btn btn-gold" onclick="showNicknameModal()">✏️ ИЗМЕНИТЬ НИК</div>
                    </div>
                    
                    <div class="warning-box" style="margin-top:20px;">
                        <h3>⚠️ ВНИМАНИЕ!</h3>
                        <p style="color:#ff9999; font-size:14px;">
                            Все данные хранятся локально на этом устройстве.<br>
                            При удалении игры прогресс НЕ ВОССТАНАВЛИВАЕТСЯ.
                        </p>
                    </div>
                    
                    <div style="margin-top:30px; text-align:center;">
                        <div class="info-text">📅 ИЗДАНИЕ 2026</div>
                        <div class="info-text">👨‍💻 СОЗДАТЕЛИ: SuguruStudio</div>
                        <div class="info-text">🔧 ВЕРСИЯ: ${APP_VERSION}</div>
                        <div class="info-text"><a href="#" class="footer-link" onclick="alert('Политика конфиденциальности'); return false;">🔒 ПОЛИТИКА</a></div>
                    </div>
                </div>
            `;
        }
        
        function toggleSound() {
            settings.soundEnabled = !settings.soundEnabled;
            saveGame();
            renderCurrentTab();
        }
        
        function toggleEffects() {
            settings.effectsEnabled = !settings.effectsEnabled;
            saveGame();
            renderCurrentTab();
        }
        
        function showNicknameModal() {
            document.getElementById('nicknameInput').value = currentUser || '';
            document.getElementById('nicknameModal').classList.add('active');
        }
        
        function closeNicknameModal() {
            document.getElementById('nicknameModal').classList.remove('active');
        }
        
        function saveNickname() {
            const newNick = document.getElementById('nicknameInput').value.trim();
            if (!newNick) return;
            
            currentUser = newNick;
            document.getElementById('username').innerHTML = `👑 ${newNick} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
            
            saveGame();
            closeNicknameModal();
            renderCurrentTab();
            updateTopPlayers();
        }
        
        function resetGame() {
            if (confirm('ТОЧНО СБРОСИТЬ ВЕСЬ ПРОГРЕСС?\n\nЭто действие необратимо!')) {
                localStorage.removeItem('imperiaClickerSave');
                localStorage.removeItem('imperiaTopPlayers');
                location.reload();
            }
        }
        
        // ========== АВТОМАТИЧЕСКИЙ ДОХОД ==========
        
        setInterval(() => {
            if (!gameState) return;
            
            let income = 0;
            
            if (gameState.autoClickerLevel > 0) {
                income += gameState.autoClickerLevel;
            }
            
            if (gameState.myBusinesses && gameState.myBusinesses.length > 0) {
                gameState.myBusinesses.forEach(b => {
                    const t = businessTemplates[b.templateId];
                    if (b.level > 0 && t) {
                        const inc = t.baseIncome * b.level;
                        income += inc;
                        b.totalEarned = (b.totalEarned || 0) + inc;
                    }
                });
            }
            
            if (income > 0) {
                gameState.balance = (gameState.balance || 0) + income;
                gameState.totalEarned = (gameState.totalEarned || 0) + income;
            }
            
            gameState.playTime = (gameState.playTime || 0) + 1;
            
            updateUI();
            saveGame();
        }, 1000);
        
        // Обновление топа каждые 30 секунд
        setInterval(() => {
            if (gameState) {
                updateTopPlayers();
                // Если открыт топ, обновляем отображение
                const activeTab = document.querySelector('.nav-item.active');
                if (activeTab && activeTab.dataset.tab === 'top') {
                    renderTab('top');
                }
            }
        }, 30000);
        
        // Проверка улучшений
        setInterval(checkBusinessUpgrades, 1000);
        
        // ========== НАВИГАЦИЯ ==========
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if (!gameState) return;
                
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
                renderTab(this.dataset.tab);
            });
        });
        
        // ========== ЗАПУСК ==========
        
        window.onload = function() {
            loadTopPlayers();
            
            if (loadGame()) {
                document.getElementById('header').style.display = 'block';
                document.getElementById('bottomNav').style.display = 'flex';
                document.getElementById('username').innerHTML = `👑 ${currentUser} <span class="warning-badge">⚠️ ЛОКАЛЬНО</span>`;
                
                updateUI();
                renderTab('home');
                updateTopPlayers();
            } else {
                showWelcomeScreen();
            }
            
            // Глобальные функции
            window.handleClick = handleClick;
            window.openBuyBusinessModal = openBuyBusinessModal;
            window.buyBusinessFromModal = buyBusinessFromModal;
            window.openBusiness = openBusiness;
            window.startUpgrade = startUpgrade;
            window.sellBusiness = sellBusiness;
            window.closeBusinessModal = closeBusinessModal;
            window.showPropertyCategory = showPropertyCategory;
            window.buyProperty = buyProperty;
            window.closePropertyModal = closePropertyModal;
            window.showGarage = showGarage;
            window.showMyHouses = showMyHouses;
            window.showMyPlanes = showMyPlanes;
            window.showMyShips = showMyShips;
            window.buyUpgrade = buyUpgrade;
            window.exchangeDiamonds = exchangeDiamonds;
            window.resetGame = resetGame;
            window.showNicknameModal = showNicknameModal;
            window.closeNicknameModal = closeNicknameModal;
            window.saveNickname = saveNickname;
            window.toggleSound = toggleSound;
            window.toggleEffects = toggleEffects;
        };
    </script>
</body>
</html>
