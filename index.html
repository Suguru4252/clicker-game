<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ТЕСТ КАЛЕНДАРЯ 1000 ДНЕЙ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .test-container {
            max-width: 800px;
            width: 100%;
            background: #0f1117;
            border-radius: 30px;
            padding: 30px;
            border: 2px solid #ffd700;
            color: white;
        }
        
        h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: #1a1c24;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #2a2c36;
        }
        
        .day-info {
            text-align: center;
        }
        
        .day-number {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .day-label {
            font-size: 14px;
            color: #8e8e98;
            margin-top: 5px;
        }
        
        .progress-bar {
            flex: 1;
            height: 12px;
            background: #2a2c36;
            border-radius: 6px;
            margin: 0 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 6px;
        }
        
        .timer {
            text-align: center;
            font-size: 18px;
            color: #ff9800;
            background: #1a1c24;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid #ffd700;
        }
        
        .rewards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .reward-card {
            background: #1a1c24;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2a2c36;
            position: relative;
            transition: all 0.3s;
        }
        
        .reward-card.special-10 {
            border: 2px solid #ff9800;
            background: rgba(255, 152, 0, 0.1);
        }
        
        .reward-card.special-100 {
            border: 3px solid #ff4444;
            background: rgba(255, 68, 68, 0.1);
            animation: pulse 2s infinite;
        }
        
        .reward-card.claimed {
            opacity: 0.5;
            border-color: #4caf50;
        }
        
        .reward-card.claimed::after {
            content: "✓";
            position: absolute;
            top: 5px;
            right: 5px;
            color: #4caf50;
            font-size: 18px;
            font-weight: bold;
        }
        
        .reward-day {
            font-size: 14px;
            color: #8e8e98;
            margin-bottom: 5px;
        }
        
        .reward-icon {
            font-size: 32px;
            margin: 10px 0;
        }
        
        .reward-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .reward-value {
            color: #4caf50;
            font-size: 16px;
            font-weight: bold;
        }
        
        .claim-btn {
            background: #ffd700;
            border: none;
            color: black;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.1s;
        }
        
        .claim-btn:active {
            transform: scale(0.95);
        }
        
        .claim-btn.disabled {
            background: #2a2c36;
            color: #8e8e98;
            cursor: not-allowed;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background: #1a1c24;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #2a2c36;
            margin-bottom: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8e8e98;
            margin-top: 5px;
        }
        
        .test-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .test-btn {
            flex: 1;
            background: #2a2c36;
            border: 1px solid #ffd700;
            color: white;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        
        .test-btn:active {
            background: #3a3c46;
        }
        
        .special-badge {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff9800;
            color: black;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
        }
        
        .special-badge.mega {
            background: #ff4444;
            color: white;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 10px #ff4444; }
            50% { box-shadow: 0 0 30px #ff4444; }
            100% { box-shadow: 0 0 10px #ff4444; }
        }
        
        .reset-btn {
            background: #ff4444;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>📅 КАЛЕНДАРЬ 1000 ДНЕЙ</h1>
        
        <div class="calendar-header">
            <div class="day-info">
                <div class="day-number" id="currentDay">1</div>
                <div class="day-label">ТЕКУЩИЙ ДЕНЬ</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%"></div>
            </div>
            <div class="day-info">
                <div class="day-number" id="totalDays">1000</div>
                <div class="day-label">ВСЕГО</div>
            </div>
        </div>
        
        <div class="timer" id="timer">
            ⏱️ СЛЕДУЮЩАЯ НАГРАДА ЧЕРЕЗ: 00:00:00
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="claimedCount">0</div>
                <div class="stat-label">ПОЛУЧЕНО</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalDiamonds">0</div>
                <div class="stat-label">💎 ВСЕГО</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="streakDays">0</div>
                <div class="stat-label">СТРИК</div>
            </div>
        </div>
        
        <div class="rewards-grid" id="rewardsGrid"></div>
        
        <div class="test-controls">
            <div class="test-btn" onclick="testAddDay()">➕ +1 ДЕНЬ</div>
            <div class="test-btn" onclick="testAddWeek()">➕ +7 ДНЕЙ</div>
            <div class="test-btn" onclick="testAddMonth()">➕ +30 ДНЕЙ</div>
        </div>
        
        <div class="reset-btn" onclick="testReset()">🔄 СБРОСИТЬ ТЕСТ</div>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        const REWARD_TIME = 9 * 60 * 60 * 1000; // 9:00 МСК
        const MSK_OFFSET = 3 * 60 * 60 * 1000; // UTC+3
        
        let gameState = {
            calendarDay: 1,
            lastClaimTime: null,
            claimedDays: [],
            streak: 0,
            totalDiamonds: 0
        };
        
        // ========== НАГРАДЫ ==========
        function getRewardForDay(day) {
            // Каждые 10 дней - особые награды
            if (day % 10 === 0) {
                const multiplier = day / 10;
                
                if (day === 1000) {
                    return {
                        diamonds: 1000000,
                        money: 1000000000000,
                        title: "ИМПЕРАТОР ВСЕЛЕННОЙ",
                        desc: "👑 ТИТУЛ + СКИН",
                        type: 'mega'
                    };
                }
                
                if (day === 900) {
                    return {
                        diamonds: 100000,
                        money: 100000000000,
                        title: "КРИСТАЛЛ ВЕЧНОСТИ",
                        desc: "💎 ВЕЧНЫЙ БУСТЕР",
                        type: 'mega'
                    };
                }
                
                if (day === 800) {
                    return {
                        diamonds: 50000,
                        money: 50000000000,
                        title: "АЛМАЗНЫЙ БИЗНЕС",
                        desc: "💎 СКИН + ДОХОД",
                        type: 'mega'
                    };
                }
                
                if (day === 700) {
                    return {
                        diamonds: 30000,
                        money: 30000000000,
                        title: "СВОЙ ОСТРОВ",
                        desc: "🏝️ 1T/СЕК",
                        type: 'mega'
                    };
                }
                
                if (day === 600) {
                    return {
                        diamonds: 20000,
                        money: 20000000000,
                        title: "ТЕЛЕПОРТ",
                        desc: "⚡ МГНОВЕННЫЕ АПГРЕЙДЫ",
                        type: 'mega'
                    };
                }
                
                if (day === 500) {
                    return {
                        diamonds: 10000,
                        money: 10000000000,
                        title: "ПОЛОВИНА ПУТИ",
                        desc: "🏆 10 000💎",
                        type: 'mega'
                    };
                }
                
                if (day === 400) {
                    return {
                        diamonds: 5000,
                        money: 5000000000,
                        title: "КОСМИЧЕСКАЯ СТАНЦИЯ",
                        desc: "🚀 1B/СЕК",
                        type: 'mega'
                    };
                }
                
                if (day === 300) {
                    return {
                        diamonds: 3000,
                        money: 3000000000,
                        title: "ВЕЧНЫЙ БУСТЕР",
                        desc: "⚡ +50% НАВСЕГДА",
                        type: 'mega'
                    };
                }
                
                if (day === 200) {
                    return {
                        diamonds: 2000,
                        money: 2000000000,
                        title: "УНИКАЛЬНАЯ ФЕРМА",
                        desc: "⛏️ ДОХОД х2",
                        type: 'mega'
                    };
                }
                
                if (day === 100) {
                    return {
                        diamonds: 5000,
                        money: 5000000000,
                        title: "ЮБИЛЕЙНЫЙ СУНДУК",
                        desc: "🎉 5000💎",
                        type: 'mega'
                    };
                }
                
                // Каждые 10 дней (кроме круглых)
                if (day % 100 === 0) {
                    return {
                        diamonds: 1000 * multiplier,
                        money: 1000000000 * multiplier,
                        title: `${day} ДНЕЙ!`,
                        desc: `💰 МЕГА-НАГРАДА`,
                        type: 'special-100'
                    };
                }
                
                return {
                    diamonds: 100 * multiplier,
                    money: 100000000 * multiplier,
                    title: `${day} ДНЕЙ`,
                    desc: `🎁 ОСОБАЯ НАГРАДА`,
                    type: 'special-10'
                };
            }
            
            // Обычные дни
            const baseDiamonds = Math.floor(day / 10) + 5;
            const baseMoney = 10000 * day;
            
            return {
                diamonds: baseDiamonds,
                money: baseMoney,
                title: `День ${day}`,
                desc: `💰 ${formatNumber(baseMoney)} + ${baseDiamonds}💎`,
                type: 'normal'
            };
        }
        
        // ========== ФОРМАТИРОВАНИЕ ==========
        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(1) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toString();
        }
        
        function formatTime(ms) {
            if (ms < 0) return "00:00:00";
            
            const hours = Math.floor(ms / (60 * 60 * 1000));
            const minutes = Math.floor((ms % (60 * 60 * 1000)) / (60 * 1000));
            const seconds = Math.floor((ms % (60 * 1000)) / 1000);
            
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // ========== ПОЛУЧЕНИЕ НАГРАДЫ ==========
        function claimReward(day) {
            if (gameState.claimedDays.includes(day)) {
                alert('❌ НАГРАДА УЖЕ ПОЛУЧЕНА!');
                return false;
            }
            
            if (day > gameState.calendarDay) {
                alert('❌ ЭТОТ ДЕНЬ ЕЩЕ НЕ НАСТУПИЛ!');
                return false;
            }
            
            const reward = getRewardForDay(day);
            gameState.claimedDays.push(day);
            gameState.totalDiamonds += reward.diamonds;
            
            // Обновляем стрик
            if (day === gameState.calendarDay) {
                gameState.streak++;
            }
            
            renderCalendar();
            alert(`✅ ПОЛУЧЕНО: ${reward.desc}\n💰 +${formatNumber(reward.money)} монет\n💎 +${reward.diamonds} алмазов`);
            
            return true;
        }
        
        // ========== РЕНДЕР ==========
        function renderCalendar() {
            const grid = document.getElementById('rewardsGrid');
            const currentDay = document.getElementById('currentDay');
            const progressBar = document.getElementById('progressBar');
            const claimedCount = document.getElementById('claimedCount');
            const totalDiamonds = document.getElementById('totalDiamonds');
            const streakDays = document.getElementById('streakDays');
            
            currentDay.textContent = gameState.calendarDay;
            progressBar.style.width = `${(gameState.calendarDay / 1000) * 100}%`;
            claimedCount.textContent = gameState.claimedDays.length;
            totalDiamonds.textContent = gameState.totalDiamonds;
            streakDays.textContent = gameState.streak;
            
            // Показываем ближайшие 30 дней
            const startDay = Math.max(1, gameState.calendarDay - 5);
            const endDay = Math.min(1000, startDay + 29);
            
            let html = '';
            
            for (let day = startDay; day <= endDay; day++) {
                const reward = getRewardForDay(day);
                const isClaimed = gameState.claimedDays.includes(day);
                const isAvailable = day <= gameState.calendarDay && !isClaimed;
                
                let cardClass = 'reward-card';
                if (reward.type === 'special-10') cardClass += ' special-10';
                if (reward.type === 'special-100' || reward.type === 'mega') cardClass += ' special-100';
                if (isClaimed) cardClass += ' claimed';
                
                let specialBadge = '';
                if (day % 10 === 0 && day % 100 !== 0) {
                    specialBadge = '<div class="special-badge">🎁 10 ДНЕЙ</div>';
                }
                if (day % 100 === 0 && day !== 1000) {
                    specialBadge = '<div class="special-badge mega">🌟 100 ДНЕЙ</div>';
                }
                if (day === 1000) {
                    specialBadge = '<div class="special-badge mega">👑 ФИНАЛ</div>';
                }
                
                html += `
                    <div class="${cardClass}">
                        ${specialBadge}
                        <div class="reward-day">День ${day}</div>
                        <div class="reward-icon">${reward.type === 'mega' ? '👑' : (day % 10 === 0 ? '🎁' : '📦')}</div>
                        <div class="reward-name">${reward.title}</div>
                        <div class="reward-value">+${reward.diamonds}💎</div>
                        <div style="font-size:11px; color:#8e8e98; margin:5px 0;">${formatNumber(reward.money)}💰</div>
                        ${isAvailable ? 
                            `<button class="claim-btn" onclick="claimReward(${day})">ПОЛУЧИТЬ</button>` : 
                            `<button class="claim-btn disabled" disabled>${isClaimed ? 'ПОЛУЧЕНО' : 'ЗАКРЫТО'}</button>`
                        }
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }
        
        // ========== ТЕСТОВЫЕ ФУНКЦИИ ==========
        function testAddDay() {
            if (gameState.calendarDay < 1000) {
                gameState.calendarDay++;
                // Если пропустили день - сбрасываем стрик
                if (!gameState.claimedDays.includes(gameState.calendarDay - 1)) {
                    gameState.streak = 0;
                }
                renderCalendar();
                updateTimer();
            }
        }
        
        function testAddWeek() {
            for (let i = 0; i < 7; i++) {
                if (gameState.calendarDay < 1000) {
                    gameState.calendarDay++;
                }
            }
            // Сбрасываем стрик (для теста)
            gameState.streak = 0;
            renderCalendar();
            updateTimer();
        }
        
        function testAddMonth() {
            for (let i = 0; i < 30; i++) {
                if (gameState.calendarDay < 1000) {
                    gameState.calendarDay++;
                }
            }
            gameState.streak = 0;
            renderCalendar();
            updateTimer();
        }
        
        function testReset() {
            gameState = {
                calendarDay: 1,
                lastClaimTime: null,
                claimedDays: [],
                streak: 0,
                totalDiamonds: 0
            };
            renderCalendar();
            updateTimer();
        }
        
        // ========== ТАЙМЕР ==========
        function updateTimer() {
            const timerEl = document.getElementById('timer');
            
            // Для теста устанавливаем случайное время
            const now = Date.now();
            const nextReward = new Date();
            nextReward.setHours(9, 0, 0, 0); // 9:00
            nextReward.setDate(nextReward.getDate() + 1);
            
            const timeLeft = nextReward - now;
            timerEl.textContent = `⏱️ СЛЕДУЮЩАЯ НАГРАДА ЧЕРЕЗ: ${formatTime(timeLeft)}`;
        }
        
        // ========== ЗАПУСК ==========
        window.onload = function() {
            renderCalendar();
            updateTimer();
            setInterval(updateTimer, 1000);
            
            window.claimReward = claimReward;
            window.testAddDay = testAddDay;
            window.testAddWeek = testAddWeek;
            window.testAddMonth = testAddMonth;
            window.testReset = testReset;
        };
    </script>
</body>
</html>
